  <main>
    
    <h2>CREA TU CUENTA</h2>

    <!--FORM REGISTRO-->

    <section class="vh-100 bg-image"
  style="background-image: url('https://mdbcdn.b-cdn.net/img/Photos/new-templates/search-box/img4.webp');">
      <div class="mask d-flex align-items-center h-100 gradient-custom-3">
        <div class="container h-100">
          <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-9 col-lg-7 col-xl-6">
              <div class="card" style="border-radius: 15px;">
                <div class="card-body p-5">
                  <form id="formRegistro">

                    <div data-mdb-input-init class="form-outline mb-4">
                      <label class="form-label" for="nombre">Tu nombre</label><br>
                      <input type="text" id="nombre" class="form-control form-control-lg" />

                    </div>

                    <div data-mdb-input-init class="form-outline mb-4">
                      <label class="form-label" for="correo">Tu correo electrónico</label><br>
                      <input type="email" id="correo" class="form-control form-control-lg" />
                      
                    </div>

                    <div data-mdb-input-init class="form-outline mb-4">
                      <label class="form-label" for="clave">Clave</label><br>
                      <input type="password" id="clave" class="form-control form-control-lg" />
                      
                    </div>

                    <div data-mdb-input-init class="form-outline mb-4">
                      <label class="form-label" for="repetirClave">Repite tu clave</label><br>
                      <input type="password" id="repetirClave" class="form-control form-control-lg" />
                      
                    </div>

                    <div class="form-check d-flex justify-content-center mb-5">
                      <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3cg" />
                      <label class="form-check-label" for="form2Example3g">
                        Estoy de acuerdo con todas las afirmaciones en los <a href="#!" class="text-body"><u>Terminos de uso</u></a>
                      </label>
                    </div>

                    <div class="d-flex justify-content-center">
                      <button  type="submit" data-mdb-button-init
                        data-mdb-ripple-init class="btn btn-success btn-block btn-lg gradient-custom-4 text-body">Registrar</button>
                    </div>

                    <p class="text-center text-muted mt-5 mb-0">¿Ya tienes una cuenta? 
                    <div>
                      <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-success btn-block btn-lg gradient-custom-4 text-body"><a href="../pages/usuarios.html"
                        class="fw-bold text-body"><u></u>Ingresa aquí</a></p>
                      </button>
                    </div>
                      

                  </form>

                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
